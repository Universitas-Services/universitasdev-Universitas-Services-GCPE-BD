version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=contrataciones_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=supersecreto

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_NAME=contrataciones_db
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=supersecreto
      - DATABASE_HOST=db
      - DATABASE_PORT=5432

  worker:
    build: .
    command: python manage.py qcluster
    volumes:
      - .:/app
    depends_on:
      - db
      - web
    environment:
      - DATABASE_NAME=contrataciones_db
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=supersecreto
      - DATABASE_HOST=db
      - DATABASE_PORT=5432

volumes:
  postgres_data:
