name: Django CI - Pruebas Automáticas

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: supersecreto
          POSTGRES_DB: contrataciones_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: 📥 Descargar código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: 🎭 Instalar Navegadores Playwright
      run: playwright install chromium

    - name: 🧪 Ejecutar Pruebas
      env:
        SECRET_KEY: 'clave-falsa-para-tests'
        DEBUG: 'True'
        ALLOWED_HOSTS: '*'
        DATABASE_URL: 'postgres://admin:supersecreto@localhost:5432/contrataciones_db_test'
      run: |
        pytest
