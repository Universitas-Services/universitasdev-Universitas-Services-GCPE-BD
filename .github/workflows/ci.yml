name: Django CI

# Se activa cuando haces push o pull request a la rama main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Configuramos un servicio de Base de Datos temporal solo para el CI
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: contrataciones_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: supersecreto
        ports:
          - 5432:5432
        # Healthcheck: Esperamos a que la DB esté lista antes de correr tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    # 1. Descargamos el código del repositorio
    - uses: actions/checkout@v4

    # 2. Instalamos Python 3.11 (tu versión del Dockerfile)
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Instalamos librerías
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Instalamos los navegadores para Playwright (Tests E2E)
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium

    # 5. Revisión de Calidad (Linter)
    - name: Run Linting
      run: |
        flake8 .
        black --check .

    # 6. Ejecución de Pruebas (Pytest)
    - name: Run Tests
      env:
        # Conectamos a la DB del servicio de arriba (localhost en GitHub Actions)
        DATABASE_URL: postgres://admin:supersecreto@localhost:5432/contrataciones_db
        SECRET_KEY: 'clave-insegura-solo-para-ci'
        DEBUG: 'True'
        # Importante: Para que Playwright funcione en CI sin problemas de hilos
        DJANGO_ALLOW_ASYNC_UNSAFE: 'true'
      run: |
        pytest